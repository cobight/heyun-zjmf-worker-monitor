<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>下载步骤1-一键安装脚本</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f6f8fb;
      color: #172033;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }
    main {
      width: min(520px, calc(100% - 32px));
      padding: 32px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, .12);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0 0 22px; color: #667085; line-height: 1.7; }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    .status { margin-top: 18px; font-size: 14px; color: #475467; }
  </style>
</head>
<body>
  <main>
    <h1>下载步骤1-一键安装脚本</h1>
    <p>正在准备下载文件：步骤1-一键安装脚本.bat。若没有自动下载，请点击下面按钮。</p>
    <button id="download">立即下载</button>
    <div id="status" class="status">等待下载...</div>
  </main>
  <script>
    const fileName = '步骤1-一键安装脚本.bat';
    const rawUrl = 'https://raw.githubusercontent.com/loqwe/heyun-zjmf-worker-monitor/main/windows-one-click-deploy/%E6%AD%A5%E9%AA%A41-%E4%B8%80%E9%94%AE%E5%AE%89%E8%A3%85%E8%84%9A%E6%9C%AC.bat';

    async function downloadStep1() {
      const status = document.getElementById('status');
      status.textContent = '正在下载...';
      const response = await fetch(rawUrl, { cache: 'no-store' });
      if (!response.ok) throw new Error(`下载失败：HTTP ${response.status}`);
      const content = await response.text();
      const blobUrl = URL.createObjectURL(new Blob([content], { type: 'application/x-msdownload' }));
      const link = document.createElement('a');
      link.href = blobUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(blobUrl);
      status.textContent = `已触发下载：${fileName}`;
    }

    document.getElementById('download').addEventListener('click', () => {
      downloadStep1().catch((error) => {
        document.getElementById('status').textContent = error.message;
      });
    });
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('download').click(), 300);
    });
  </script>
</body>
</html>
