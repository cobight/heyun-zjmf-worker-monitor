name: 发布步骤1安装脚本附件

on:
  push:
    branches:
      - main
    paths:
      - 'windows-one-click-deploy/步骤1-一键安装.bat'
      - 'windows-one-click-deploy/步骤1-一键安装脚本.bat'
      - '.github/workflows/release-step1-bat.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 发布步骤1 Release 附件
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: release-step1-bat-v1
          ASSET_NAME: step1-install.bat
          ASSET_LABEL: 步骤1-一键安装脚本.bat
          ASSET_PATH: windows-one-click-deploy/步骤1-一键安装.bat
        with:
          script: |
            const fs = require('node:fs');
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: process.env.RELEASE_TAG,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
                name: process.env.RELEASE_TAG,
                draft: false,
                prerelease: false,
              });
            }
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
            });
            const staleNames = new Set([
              process.env.ASSET_NAME,
              process.env.ASSET_LABEL,
              '1-.bat',
            ]);
            for (const asset of assets.data) {
              if (staleNames.has(asset.name) || asset.label === process.env.ASSET_LABEL) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }
            const data = fs.readFileSync(process.env.ASSET_PATH);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: process.env.ASSET_NAME,
              label: process.env.ASSET_LABEL,
              data,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': data.length,
              },
            });
