name: 发布步骤1安装脚本附件

on:
  push:
    branches:
      - main
    paths:
      - 'windows-one-click-deploy/步骤1-一键安装脚本.bat'
      - '.github/workflows/release-step1-bat.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 发布中文名 Release 附件
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: release-step1-bat-v1
          ASSET_NAME: 步骤1-一键安装脚本.bat
          ASSET_PATH: windows-one-click-deploy/步骤1-一键安装脚本.bat
        with:
          script: |
            const fs = require('node:fs');
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: process.env.RELEASE_TAG,
            });
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
            });
            for (const asset of assets.data) {
              if (asset.name === process.env.ASSET_NAME || asset.name === '1-.bat') {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }
            const data = fs.readFileSync(process.env.ASSET_PATH);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: process.env.ASSET_NAME,
              data,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': data.length,
              },
            });
