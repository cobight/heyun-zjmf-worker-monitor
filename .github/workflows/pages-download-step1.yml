name: 发布步骤1下载页

on:
  push:
    branches:
      - main
    paths:
      - 'download-step1.html'
      - '.github/workflows/pages-download-step1.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-download-step1
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 准备 Pages 目录
        run: |
          mkdir -p public
          cp download-step1.html public/download-step1.html

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: 发布 Pages
        id: deployment
        uses: actions/deploy-pages@v4
